<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SecurityCommunity – 게시글 작성</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="common.css" />
    <link rel="stylesheet" href="write.css" />
  </head>
  <body>
    <header>
      <a class="logo" href="index.html">Security<span>Community</span></a>
      <div class="header-crumb">
        <a href="main_web.html">PWN</a>
        <span class="sep">›</span>
        <span class="active">글쓰기</span>
      </div>
    </header>

    <div class="write-wrapper">
      <div class="container">
        <div class="title">
          <input type="text" placeholder="제목" />
        </div>

        <div class="info">
          <input type="text" class="nickname" placeholder="작성자" />
          <span class="sep-bar">|</span>
          <input type="date" class="date" />
        </div>

        <div class="content">
          <textarea placeholder="내용"></textarea>
        </div>

        <div class="image">
          <label for="file-upload" class="file-btn">파일 선택</label>
          <input id="file-upload" type="file" accept="image/*" />
          <span class="file-name">선택된 파일 없음</span>
        </div>

        <div class="buttons">
          <a class="btn" href="main_web.html">취소</a>
          <button class="btn btn-primary">작성</button>
        </div>
      </div>
    </div>
  </body>
</html>
